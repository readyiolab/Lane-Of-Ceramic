version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@laneofceramic.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certificates:/letsencrypt"
    restart: unless-stopped

  frontend:
    build:
      context: ./Artisanal-Dinnerware
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`laneofceramic.com`, `www.laneofceramic.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - default
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laneofceramic
      MYSQL_USER: admin
      MYSQL_PASSWORD: Jhanvi@123
      MYSQL_ROOT_PASSWORD: Jhanvi@123
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    depends_on:
      - db
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=Jhanvi@123
      - DB_NAME=laneofceramic
      - DB_PORT=3306
      - DATABASE_URL=mysql://admin:Jhanvi@123@db:3306/laneofceramic
    restart: unless-stopped

volumes:
  mysql_data:
  traefik-certificates:

networks:
  default:
