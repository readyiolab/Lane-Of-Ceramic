version: '3.8'

services:
  frontend:
    build:
      context: ./Artisanal-Dinnerware
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=host.docker.internal
      - DB_USER=admin
      - DB_PASS=Jhanvi@123
      - DB_NAME=laneofceramic
      - DB_PORT=3306
      - DATABASE_URL=mysql://admin:Jhanvi@123@host.docker.internal:3306/laneofceramic
    restart: unless-stopped
